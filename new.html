<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Neues Thema — DevCommunity</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="new">
    <header id="app-header"></header>

    <main class="container">
        <div id="flash-container"></div>

        <div class="card">
            <h1>Neues Thema erstellen</h1>
            <form id="threadForm">
                <input class="input" name="title" placeholder="Titel">
                <input class="input" name="tag" placeholder="Tag (z. B. javascript)">
                <textarea class="input" name="content" placeholder="Inhalt / Beschreibung"></textarea>
                <button class="btn">Thema erstellen</button>
            </form>
        </div>
    </main>

    <footer class="container"><small>© DevCommunity</small></footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>

</html>
